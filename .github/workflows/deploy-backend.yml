name: Deploy backend to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend/Bonfire.API/Bonfire.API.csproj

      - name: Build
        run: dotnet build backend/Bonfire.API/Bonfire.API.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish backend/Bonfire.API/Bonfire.API.csproj --no-build --configuration Release -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
