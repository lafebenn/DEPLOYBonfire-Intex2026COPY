# After deploy: In Azure Portal > App Service > Configuration, set ConnectionStrings__DefaultConnection
# for Azure SQL with Encrypt=True and TrustServerCertificate=True (see course video / firewall rules).

name: Deploy backend to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/Bonfire.API/Bonfire.API.csproj

      - name: Build
        run: dotnet build backend/Bonfire.API/Bonfire.API.csproj \
          --no-restore --configuration Release

      - name: Publish
        run: dotnet publish backend/Bonfire.API/Bonfire.API.csproj \
          --no-build --configuration Release -o ./publish

      - name: Zip publish output
        run: cd publish && zip -r ../publish.zip . && cd ..

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip to Azure Web App
        run: |
          az webapp deploy \
            --resource-group bonfire-rg \
            --name bonfire-api \
            --src-path publish.zip \
            --type zip